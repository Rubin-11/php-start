version: "3.8"

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:

services:
  php:
    container_name: ${PROJECT_SLUG}_php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    networks:
      - app_network
    volumes:
      - .:/app
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-app}
      DB_USER: ${POSTGRES_USER:-user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    container_name: ${PROJECT_SLUG}_nginx
    image: ${NGINX_DOCKER_IMAGE:-nginx:alpine}
    networks:
      - app_network
    depends_on:
      - php
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  postgres:
    container_name: ${PROJECT_SLUG}_db
    image: ${POSTGRES_DOCKER_IMAGE:-postgres:17}
    networks:
      - app_network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
